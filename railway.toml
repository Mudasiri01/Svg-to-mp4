[deploy]
startCommand = "node server/index.js"

[build]
buildCommand = "cd server && npm ci && npx playwright install chromium && cd .. && npm run build"

[variables]
RAILPACK_NO_SPA = "1"
RAILPACK_DEPLOY_APT_PACKAGES = "chromium ffmpeg libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2"
